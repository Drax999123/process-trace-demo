<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Protected Information Access</title>
</head>

<body style="font-family: Arial; text-align: center; margin: 80px; line-height: 1.6;">

<script>
  var pwd = prompt("Enter access password:");

  if (pwd !== "361490") {
    document.body.innerHTML = 
      "<h2>Access Denied</h2>" +
      "<p>Unauthorized access.</p>";
  } else {
    document.body.innerHTML =
      "<h2>Authorized Information</h2>" +
      "<p>Rooted in the Zhejiang Official Dual-Grade Normal Institution founded in 1908, </p>" +
      "<p>Hangzhou Normal University abides by its time-honored motto: </p>" +
      "<p>Diligence, Circumspection, Integrity, Benevolence; Erudition, Elegance, Perseverance, Endeavor.</p>" +
      "<p>It stands as an iconic fountainhead of modern aesthetic education and the Zhejiang New Culture Movement.</p>";
  }
</script>

</body>
</html>
